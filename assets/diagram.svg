<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 600; fill: #1a1a1a; }
    .label { font-size: 13px; fill: #fff; }
    .label-dark { font-size: 13px; fill: #1a1a1a; }
    .small { font-size: 11px; fill: #666; }
    .arrow { fill: none; stroke: #999; stroke-width: 2; }
    .arrow-head { fill: #999; }
  </style>

  <!-- Background -->
  <rect width="820" height="420" fill="#fafafa" rx="12"/>

  <!-- Before section -->
  <text x="160" y="36" text-anchor="middle" class="title">Before</text>
  <text x="160" y="56" text-anchor="middle" class="small">10 messages · ~1,600 tokens</text>

  <!-- AI/Tool pairs - Before -->
  <rect x="40" y="74" width="240" height="30" rx="6" fill="#4A90D9"/>
  <text x="160" y="94" text-anchor="middle" class="label">AI → read_file("auth.py")</text>

  <rect x="40" y="108" width="240" height="30" rx="6" fill="#5BA55B"/>
  <text x="160" y="128" text-anchor="middle" class="label">Tool → &lt;file content&gt;</text>

  <rect x="40" y="146" width="240" height="30" rx="6" fill="#4A90D9"/>
  <text x="160" y="166" text-anchor="middle" class="label">AI → read_file("users.py")</text>

  <rect x="40" y="180" width="240" height="30" rx="6" fill="#5BA55B"/>
  <text x="160" y="200" text-anchor="middle" class="label">Tool → &lt;file content&gt;</text>

  <rect x="40" y="218" width="240" height="30" rx="6" fill="#4A90D9"/>
  <text x="160" y="238" text-anchor="middle" class="label">AI → read_file("db.py")</text>

  <rect x="40" y="252" width="240" height="30" rx="6" fill="#5BA55B"/>
  <text x="160" y="272" text-anchor="middle" class="label">Tool → &lt;file content&gt;</text>

  <rect x="40" y="290" width="240" height="30" rx="6" fill="#4A90D9"/>
  <text x="160" y="310" text-anchor="middle" class="label">AI → read_file("routes.py")</text>

  <rect x="40" y="324" width="240" height="30" rx="6" fill="#5BA55B"/>
  <text x="160" y="344" text-anchor="middle" class="label">Tool → &lt;file content&gt;</text>

  <rect x="40" y="362" width="240" height="30" rx="6" fill="#4A90D9" stroke="#2563EB" stroke-width="2"/>
  <text x="160" y="382" text-anchor="middle" class="label">AI → read_file("config.py")</text>

  <rect x="40" y="396" width="240" height="0" rx="6" fill="#5BA55B"/>

  <!-- Arrow -->
  <path d="M 320 210 L 460 210" class="arrow" stroke-dasharray="6,4"/>
  <polygon points="458,204 470,210 458,216" class="arrow-head"/>
  <text x="395" y="198" text-anchor="middle" class="small">collapse</text>

  <!-- After section -->
  <text x="640" y="36" text-anchor="middle" class="title">After</text>
  <text x="640" y="56" text-anchor="middle" class="small">3 messages · ~320 tokens</text>

  <!-- Badge -->
  <rect x="500" y="140" width="280" height="44" rx="8" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="640" y="158" text-anchor="middle" class="label-dark" font-size="11">4 tool results omitted</text>
  <text x="640" y="174" text-anchor="middle" class="label-dark" font-size="11">most recent result preserved below</text>

  <!-- Kept pair -->
  <rect x="500" y="210" width="280" height="30" rx="6" fill="#4A90D9" stroke="#2563EB" stroke-width="2"/>
  <text x="640" y="230" text-anchor="middle" class="label">AI → read_file("config.py")</text>

  <rect x="500" y="248" width="280" height="30" rx="6" fill="#5BA55B" stroke="#16A34A" stroke-width="2"/>
  <text x="640" y="268" text-anchor="middle" class="label">Tool → &lt;file content&gt;</text>

  <!-- Reduction label -->
  <rect x="548" y="310" width="184" height="36" rx="18" fill="#16A34A" opacity="0.1" stroke="#16A34A" stroke-width="1.5"/>
  <text x="640" y="334" text-anchor="middle" font-size="14" font-weight="600" fill="#16A34A">92% token reduction</text>
</svg>
